version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-techdesk}
      POSTGRES_USER: ${DB_USER:-techadmin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-techsecurepassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techadmin -d techdesk"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@techdesk.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    depends_on:
      - postgres


  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: mailhog
    ports:
      - "1025:1025"   # SMTP — auth-service sends emails here
      - "8025:8025"   # Web UI — view emails at http://localhost:8025

  eureka-server:
    build:
      context: ./services/eureka-server
      dockerfile: Dockerfile
    container_name: eureka-server
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-supercalifragilisticexpialidociousmysticalsecretsignkeytechdesk2026}
    depends_on:
      eureka-server:
        condition: service_healthy
      redis:
        condition: service_healthy

  tenant-service:
    build:
      context: ./services/tenant-service
      dockerfile: Dockerfile
    container_name: tenant-service
    ports:
      - "8082:8082"
    environment:
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: techdesk
      DB_USER: techadmin
      DB_PASSWORD: techsecurepassword
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "8083:8083"
    environment:
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: techdesk
      DB_USER: techadmin
      DB_PASSWORD: techsecurepassword
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  ticket-service:
