server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
        - id: tenant-service
          uri: lb://tenant-service
          predicates:
            - Path=/api/tenants/**
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
        - id: ticket-service
          uri: lb://ticket-service
          predicates:
            - Path=/api/tickets/**
        - id: asset-service
          uri: lb://asset-service
          predicates:
            - Path=/api/assets/**
        - id: gadget-service
          uri: lb://gadget-service
          predicates:
            - Path=/api/gadget-requests/**
        - id: file-service
          uri: lb://file-service
          predicates:
            - Path=/api/files/**
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**
        - id: sla-service
          uri: lb://sla-service
          predicates:
            - Path=/api/sla/**
        - id: report-service
          uri: lb://report-service
          predicates:
            - Path=/api/reports/**
        - id: audit-service
          uri: lb://audit-service
          predicates:
            - Path=/api/audit-logs/**

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
